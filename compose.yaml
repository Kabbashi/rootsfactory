services:
    laravel.test:
        container_name: rootsfactory-app
        restart: unless-stopped
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-8212}:80'
            - '${VITE_PORT:-5176}:${VITE_PORT:-5176}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - traefik-public
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        labels:
            - "traefik.enable=true"
            - "traefik.docker.network=traefik-public"
            # Primary: rootsfactory.org
            - "traefik.http.routers.rootsfactory.rule=Host(`rootsfactory.org`)"
            - "traefik.http.routers.rootsfactory.entrypoints=websecure"
            - "traefik.http.routers.rootsfactory.tls.certresolver=cloudflare"
            - "traefik.http.services.rootsfactory.loadbalancer.server.port=80"
            - "traefik.http.routers.rootsfactory.middlewares=rootsfactory-secheaders"
            # www.rootsfactory.org -> rootsfactory.org (301)
            - "traefik.http.routers.rootsfactory-www.rule=Host(`www.rootsfactory.org`)"
            - "traefik.http.routers.rootsfactory-www.entrypoints=websecure"
            - "traefik.http.routers.rootsfactory-www.tls.certresolver=cloudflare"
            - "traefik.http.routers.rootsfactory-www.service=rootsfactory"
            - "traefik.http.routers.rootsfactory-www.middlewares=rootsfactory-www-redir"
            - "traefik.http.middlewares.rootsfactory-www-redir.redirectregex.regex=^https://www\\.rootsfactory\\.org/(.*)"
            - "traefik.http.middlewares.rootsfactory-www-redir.redirectregex.replacement=https://rootsfactory.org/$${1}"
            - "traefik.http.middlewares.rootsfactory-www-redir.redirectregex.permanent=true"
            # Security headers
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.stsSeconds=31536000"
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.stsIncludeSubdomains=true"
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.stsPreload=true"
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.frameDeny=true"
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.contentTypeNosniff=true"
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.referrerPolicy=strict-origin-when-cross-origin"
            - "traefik.http.middlewares.rootsfactory-secheaders.headers.browserXssFilter=true"

    pgsql:
        container_name: rootsfactory-postgres
        restart: unless-stopped
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5436}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'rootsfactory-pgsql:/var/lib/postgresql'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
            retries: 3
            timeout: 5s

    redis:
        container_name: rootsfactory-redis
        restart: unless-stopped
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6383}:6379'
        volumes:
            - 'rootsfactory-redis:/data'
        networks:
            - sail
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            retries: 3
            timeout: 5s

    scheduler:
        container_name: rootsfactory-scheduler
        image: 'sail-8.5/app'
        restart: unless-stopped
        command: >
            sh -c "while true; do
              php artisan schedule:run --verbose --no-interaction &
              sleep 60;
            done"
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy

    queue:
        container_name: rootsfactory-queue
        image: 'sail-8.5/app'
        restart: unless-stopped
        command: php artisan queue:work --tries=3 --backoff=30 --timeout=300 --max-time=3600 --sleep=3 --verbose
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            # The AI co-thinker job (GenerateAiInsight) calls the shared LiteLLM
            # gateway, which lives on traefik-public — the worker must join it too.
            - traefik-public
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy

networks:
    sail:
        driver: bridge
        # Festes, freies Subnetz — Docker's Auto-Pick (192.168.16/20) wird auf diesem Host
        # geblackholt (intra-Bridge-Timeout trotz korrekter DOCKER-FORWARD-Regel).
        ipam:
            config:
                - subnet: 192.168.192.0/20
    traefik-public:
        external: true

volumes:
    rootsfactory-pgsql:
        driver: local
    rootsfactory-redis:
        driver: local
